services:
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: petroot
      MYSQL_DATABASE: PetHub
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./pethub.sql:/docker-entrypoint-initdb.d/01-pethub.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-ppetroot"]
      interval: 8s
      timeout: 5s
      retries: 12
      start_period: 45s

  web:
    build:
      context: ./PetHubProject
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      MYSQL_URL: jdbc:mysql://db:3306/PetHub
      MYSQL_USER: root
      MYSQL_PASSWORD: petroot
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
